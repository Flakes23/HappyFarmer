name: Daily market price crawl

# Chạy mỗi ngày, SSH vào VPS và kích hoạt service `market-price-crawler` (profile "cron" trong
# docker-compose.prod.yml, không tự chạy cùng `up -d` của deploy.yml). Image được build/push lên
# GHCR bởi chính deploy.yml (matrix service `market-price-crawler`) mỗi khi push vào master, nên
# ở đây chỉ cần pull tag mới nhất rồi `run --rm`.
on:
  schedule:
    # 22:30 UTC = 05:30 giờ Việt Nam (UTC+7) — sau khung giờ chốt giá chợ đầu mối 2-5h sáng.
    - cron: "30 22 * * *"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Pull + run crawler on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/happyfarmer
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker compose -f docker-compose.prod.yml --profile cron pull market-price-crawler
            docker compose -f docker-compose.prod.yml --profile cron run --rm market-price-crawler
