# Chạy trên VPS — chỉ pull image đã build sẵn từ GitHub Container Registry (GHCR) qua CI/CD,
# không build từ source tại VPS (máy nhỏ, build sẽ rất chậm). Xem docs/architecture/03-infrastructure-deployment.md.
#
# 2 service AI Advisory / Notification CHƯA deploy (còn là skeleton) — chỉ 3 service + Gateway.
#
# Dùng: docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
# Cần file .env cùng thư mục (không commit) — xem .env.prod.example.
#
# `market-price-crawler` ở dưới có `profiles: ["cron"]` nên KHÔNG bị `up -d` ở trên khởi động —
# nó là console app chạy 1 lần rồi thoát, không phải service chạy liên tục. Được kích hoạt mỗi
# ngày qua GitHub Actions (`.github/workflows/crawl-daily.yml`, SSH vào VPS chạy `docker compose
# -f docker-compose.prod.yml --profile cron run --rm market-price-crawler`), xem mục 5 ở
# docs/architecture/03-infrastructure-deployment.md.

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQLSERVER_SA_PASSWORD}
      MSSQL_PID: Developer
      # Cap lại RAM SQL Server chiếm — mặc định nó cố chiếm gần hết RAM host, cần chừa chỗ cho
      # Kafka (JVM) trên VPS chỉ có 4GB tổng (Standard_B2als_v2).
      MSSQL_MEMORY_LIMIT_MB: "2048"
    ports:
      # Chỉ bind vào loopback của VPS (không public ra Internet) — dùng để SSH tunnel từ máy cá
      # nhân chạy migration (`dotnet ef database update`), không truy cập được từ ngoài.
      - "127.0.0.1:1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - happyfarmer-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis-data:/data
    networks:
      - happyfarmer-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    # Chỉ bind loopback VPS (giống sqlserver) — không public ra Internet, chỉ ai-advisory-service
    # gọi qua network nội bộ + RagIngestor chạy từ máy local qua SSH tunnel khi cần nạp tài liệu.
    ports:
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - happyfarmer-net
    # VPS 4GB đã khá sát (xem docs/architecture/03-infrastructure-deployment.md mục 2) — cap RAM
    # để Qdrant không cạnh tranh với SQL Server/Kafka nếu tập tài liệu RAG lớn dần.
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
      CLUSTER_ID: "hf-prod-kraft-cluster-01"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - happyfarmer-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  auth-service:
    image: ghcr.io/flakes23/happyfarmer-auth-service:latest
    container_name: auth-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__AuthDb: "Server=sqlserver,1433;Database=HappyFarmer_AuthDb;User Id=sa;Password=${SQLSERVER_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      ConnectionStrings__Redis: "redis:6379"
      Cloudinary__CloudName: ${CLOUDINARY_CLOUD_NAME}
      Cloudinary__ApiKey: ${CLOUDINARY_API_KEY}
      Cloudinary__ApiSecret: ${CLOUDINARY_API_SECRET}
      Kafka__BootstrapServers: "kafka:9092"
      Internal__ApiKey: ${INTERNAL_API_KEY}
    volumes:
      # Giữ key JWT (RS256) qua các lần redeploy — mất key = mọi token cũ (đăng nhập cũ) bị vô hiệu,
      # JWKS Gateway cache cũng lệch tạm thời cho tới khi refetch.
      - auth-keys:/app/keys
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - happyfarmer-net
    restart: unless-stopped

  market-price-service:
    image: ghcr.io/flakes23/happyfarmer-market-price-service:latest
    container_name: market-price-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__MarketPriceDb: "Server=sqlserver,1433;Database=HappyFarmer_MarketPriceDb;User Id=sa;Password=${SQLSERVER_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      ConnectionStrings__Redis: "redis:6379"
      Internal__ApiKey: ${INTERNAL_API_KEY}
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - happyfarmer-net
    restart: unless-stopped

  marketplace-service:
    image: ghcr.io/flakes23/happyfarmer-marketplace-service:latest
    container_name: marketplace-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__MarketplaceDb: "Server=sqlserver,1433;Database=HappyFarmer_MarketplaceDb;User Id=sa;Password=${SQLSERVER_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      Cloudinary__CloudName: ${CLOUDINARY_CLOUD_NAME}
      Cloudinary__ApiKey: ${CLOUDINARY_API_KEY}
      Cloudinary__ApiSecret: ${CLOUDINARY_API_SECRET}
      Services__AuthServiceBaseUrl: "http://auth-service:8080"
      Kafka__BootstrapServers: "kafka:9092"
      Internal__ApiKey: ${INTERNAL_API_KEY}
    depends_on:
      sqlserver:
        condition: service_healthy
      auth-service:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - happyfarmer-net
    restart: unless-stopped

  ai-advisory-service:
    image: ghcr.io/flakes23/happyfarmer-ai-advisory-service:latest
    container_name: ai-advisory-service
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__AiAdvisoryDb: "Server=sqlserver,1433;Database=HappyFarmer_AiAdvisoryDb;User Id=sa;Password=${SQLSERVER_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      ConnectionStrings__Redis: "redis:6379"
      Gemini__ApiKey: ${GEMINI_API_KEY}
      Gemini__Model: gemini-3.1-flash-lite
      Gemini__EmbeddingModel: gemini-embedding-001
      Qdrant__Host: qdrant
      Qdrant__Port: "6334"
      OpenWeatherMap__ApiKey: ${OPENWEATHERMAP_API_KEY}
      Cloudinary__CloudName: ${CLOUDINARY_CLOUD_NAME}
      Cloudinary__ApiKey: ${CLOUDINARY_API_KEY}
      Cloudinary__ApiSecret: ${CLOUDINARY_API_SECRET}
      Services__MarketPriceServiceBaseUrl: "http://market-price-service:8080"
      Services__MarketplaceServiceBaseUrl: "http://marketplace-service:8080"
      Services__AuthServiceBaseUrl: "http://auth-service:8080"
      Internal__ApiKey: ${INTERNAL_API_KEY}
      Internal__IngestApiKey: ${INTERNAL_INGEST_API_KEY}
      # URL public thật của frontend (Vercel) — dùng để chatbot build link sản phẩm/tin đăng trả
      # về cho người dùng, không phải bí mật nên hardcode thẳng (giống Kafka__BootstrapServers).
      Frontend__BaseUrl: "https://happy-farmer-beige.vercel.app"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - happyfarmer-net
    restart: unless-stopped

  market-price-crawler:
    image: ghcr.io/flakes23/happyfarmer-market-price-crawler:latest
    profiles: ["cron"]
    environment:
      # Gọi thẳng market-price-service trong network nội bộ, không qua Gateway/domain public —
      # đây là service-to-service trong cùng docker network, không phải request từ browser.
      Api__BaseUrl: "http://market-price-service:8080"
      Internal__ApiKey: ${INTERNAL_API_KEY}
    depends_on:
      market-price-service:
        condition: service_started
    networks:
      - happyfarmer-net

  gateway:
    image: ghcr.io/flakes23/happyfarmer-gateway:latest
    container_name: gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Jwt__JwksUrl: "http://auth-service:8080/.well-known/jwks.json"
      Jwt__Issuer: happyfarmer-auth
      Jwt__Audience: happyfarmer-services
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS}
      ReverseProxy__Routes__auth-route__ClusterId: auth-cluster
      ReverseProxy__Routes__auth-route__Match__Path: "/api/auth/{**remainder}"
      ReverseProxy__Routes__jwks-route__ClusterId: auth-cluster
      ReverseProxy__Routes__jwks-route__Match__Path: "/.well-known/jwks.json"
      ReverseProxy__Routes__market-price-route__ClusterId: market-price-cluster
      ReverseProxy__Routes__market-price-route__Match__Path: "/api/market-price/{**remainder}"
      ReverseProxy__Routes__marketplace-route__ClusterId: marketplace-cluster
      ReverseProxy__Routes__marketplace-route__Match__Path: "/api/marketplace/{**remainder}"
      ReverseProxy__Routes__ai-advisory-route__ClusterId: ai-advisory-cluster
      ReverseProxy__Routes__ai-advisory-route__Match__Path: "/api/ai-advisory/{**remainder}"
      ReverseProxy__Clusters__auth-cluster__Destinations__destination1__Address: "http://auth-service:8080"
      ReverseProxy__Clusters__market-price-cluster__Destinations__destination1__Address: "http://market-price-service:8080"
      ReverseProxy__Clusters__marketplace-cluster__Destinations__destination1__Address: "http://marketplace-service:8080"
      ReverseProxy__Clusters__marketplace-cluster__HttpRequest__ActivityTimeout: "00:10:00"
      ReverseProxy__Clusters__ai-advisory-cluster__Destinations__destination1__Address: "http://ai-advisory-service:8080"
      # Gemini (chat/disease-detection/harvest-prediction) có thể mất vài chục giây, dài hơn mặc định
      # YARP (100s) — nới rộng giống marketplace-cluster để tránh 504 sớm.
      ReverseProxy__Clusters__ai-advisory-cluster__HttpRequest__ActivityTimeout: "00:05:00"
    depends_on:
      - auth-service
      - market-price-service
      - marketplace-service
      - ai-advisory-service
    networks:
      - happyfarmer-net
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - gateway
    networks:
      - happyfarmer-net
    restart: unless-stopped

networks:
  happyfarmer-net:
    driver: bridge

volumes:
  sqlserver-data:
  redis-data:
  kafka-data:
  qdrant-data:
  auth-keys:
  caddy-data:
  caddy-config:
